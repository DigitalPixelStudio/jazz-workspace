name: Workspace Health Check
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Run health check
        id: health
        run: |
          echo "## Workspace Health Report" > report.md
          echo "### $(date -u '+%Y-%m-%d %H:%M UTC')" >> report.md
          echo "" >> report.md
          echo "- **Commits**: $(git log --oneline -1)" >> report.md
          echo "- **Branch**: $(git rev-parse --abbrev-ref HEAD)" >> report.md
          echo "- **Disk**: $(df -h / | awk 'NR==2 {print $3 " used / " $2}')" >> report.md
          echo "- **Files**: $(find . -type f -not -path './.git/*' | wc -l)" >> report.md
          cat report.md
      - name: Create issue if unhealthy
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Workspace Health Alert',
              body: 'Health check failed. Check workflow logs for details.'
            })
