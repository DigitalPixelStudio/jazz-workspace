name: Auto Label Issues
on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase()
            const labels = []
            if (title.includes('bug') || title.includes('fix')) labels.push('bug')
            if (title.includes('feature') || title.includes('add')) labels.push('enhancement')
            if (title.includes('doc')) labels.push('documentation')
            if (title.includes('security')) labels.push('security')
            if (labels.length > 0) {
              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              })
            }
